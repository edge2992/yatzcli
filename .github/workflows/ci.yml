name: CI
on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]
jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test -short ./... -v -count=1
      - run: go vet ./...
      - run: go build ./cmd/yatz/
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test ./... -v -count=1 -run TestE2E -timeout 120s
